services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - client
      - webapi
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  client:
    image: ${REGISTRY_IMAGE}/client:${IMAGE_TAG}
    restart: unless-stopped

  webapi:
    image: ${REGISTRY_IMAGE}/webapi:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  caddy_data:
  caddy_config:

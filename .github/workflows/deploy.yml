name: Build and deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/giviruk/genesysforge
  IMAGE_TAG: ${{ github.sha }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: server/global.json

      - name: Restore backend
        run: dotnet restore server/GenesysForge.sln

      - name: Build backend
        run: dotnet build server/GenesysForge.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test server/GenesysForge.sln --configuration Release --no-build

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Lint frontend
        working-directory: client
        run: npm run lint

      - name: Test frontend
        working-directory: client
        run: npm run test

      - name: Build frontend
        working-directory: client
        run: npm run build

  build-images:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WebApi image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/src/GenesysForge.WebApi/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}/webapi:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_IMAGE }}/webapi:latest

      - name: Build and push client image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}/client:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_IMAGE }}/client:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-images
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p /opt/genesys-forge"
          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" docker-compose.yml Caddyfile "$VPS_USER@$VPS_HOST:/opt/genesys-forge/"

      - name: Deploy compose stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            APP_DOMAIN="$APP_DOMAIN" \
            ACME_EMAIL="$ACME_EMAIL" \
            GHCR_USERNAME="$GHCR_USERNAME" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            REGISTRY_IMAGE="$REGISTRY_IMAGE" \
            IMAGE_TAG="$IMAGE_TAG" \
            'bash -se' <<'EOF'
          set -euo pipefail

          cd /opt/genesys-forge

          {
            printf 'APP_DOMAIN=%s\n' "$APP_DOMAIN"
            printf 'ACME_EMAIL=%s\n' "$ACME_EMAIL"
            printf 'REGISTRY_IMAGE=%s\n' "$REGISTRY_IMAGE"
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
          } > .env

          if [ -n "${GHCR_TOKEN:-}" ]; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          EOF
